<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Laser Point - Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-black">LASER POINT <span class="text-blue-600 uppercase text-sm tracking-widest ml-2">Gestione</span></h1>
            
            <div id="login-box" class="flex gap-2">
                <input type="password" id="pass-field" placeholder="Password Segreta" class="p-3 border rounded-xl text-sm outline-blue-500 shadow-inner">
                <button onclick="login()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-700 transition">Entra</button>
            </div>
            
            <button id="logout-btn" onclick="logout()" class="hidden text-red-500 font-bold hover:bg-red-50 px-4 py-2 rounded-xl border border-red-100 transition">Esci</button>
        </div>

        <div id="admin-panel" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-600 rounded-full"></span> 1. Categorie
                    </h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="cat-name" placeholder="Nuova (es. Compleanni)" class="flex-1 p-3 border rounded-xl text-sm">
                        <button onclick="saveCat()" class="bg-slate-900 text-white px-4 rounded-xl hover:bg-blue-600 transition">+</button>
                    </div>
                    <div id="cat-list" class="space-y-2 max-h-40 overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="bg-white p-6 rounded-3xl shadow-sm border sticky top-8">
                    <h2 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-600 rounded-full"></span> 2. Nuovo Articolo
                    </h2>
                    <div class="space-y-3">
                        <input type="text" id="p-name" placeholder="Nome Oggetto" class="w-full p-3 border rounded-xl text-sm">
                        <select id="p-cat" class="w-full p-3 border rounded-xl text-sm bg-slate-50 outline-blue-500">
                            <option value="">Seleziona Categoria...</option>
                        </select>
                        <div class="flex gap-2">
                            <input type="number" id="p-price" placeholder="Prezzo €" step="0.01" class="w-1/2 p-3 border rounded-xl text-sm">
                            <input type="text" id="p-mat" placeholder="Materiale" class="w-1/2 p-3 border rounded-xl text-sm">
                        </div>
                        <input type="text" id="p-img" placeholder="Link Immagine ImgBB" class="w-full p-3 border rounded-xl text-sm">
                        <textarea id="p-desc" placeholder="Breve descrizione..." class="w-full p-3 border rounded-xl text-sm h-24"></textarea>
                        
                        <button onclick="saveProd()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-100 transition">
                            Pubblica Prodotto
                        </button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="bg-white p-8 rounded-3xl shadow-sm border h-full">
                    <h2 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest italic">Inventario Attuale</h2>
                    <div id="prod-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const getAuth = () => localStorage.getItem('laser_token');
        
        function login() {
            localStorage.setItem('laser_token', document.getElementById('pass-field').value);
            location.reload();
        }
        
        function logout() {
            localStorage.removeItem('laser_token');
            location.reload();
        }

        async function sync() {
            const token = getAuth();
            if(!token) return;

            document.getElementById('login-box').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');

            const res = await fetch('/api/products');
            const data = await res.json();

            const cats = data.filter(i => i.id.startsWith('cat_'));
            const prods = data.filter(i => i.id.startsWith('prod_'));

            // Popola Categorie
            const select = document.getElementById('p-cat');
            const catDiv = document.getElementById('cat-list');
            select.innerHTML = '<option value="">Seleziona Categoria...</option>';
            catDiv.innerHTML = '';
            
            cats.forEach(c => {
                select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
                catDiv.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border text-sm">
                        <span class="font-medium">${c.name}</span>
                        <button onclick="remove('${c.id}')" class="text-red-400 hover:text-red-600 font-bold">×</button>
                    </div>`;
            });

            // Popola Prodotti
            document.getElementById('prod-list').innerHTML = prods.map(p => `
                <div class="p-4 bg-white border rounded-2xl flex gap-4 items-center">
                    <img src="${p.image}" class="w-16 h-16 rounded-xl object-cover bg-slate-100">
                    <div class="flex-1">
                        <p class="font-bold text-sm leading-tight">${p.name}</p>
                        <p class="text-[10px] font-bold text-blue-500 uppercase mt-1">${p.category}</p>
                    </div>
                    <button onclick="remove('${p.id}')" class="text-xs bg-red-50 text-red-600 px-3 py-1 rounded-lg hover:bg-red-100 transition font-bold">Elimina</button>
                </div>
            `).join('');
        }

        async function saveCat() {
            const name = document.getElementById('cat-name').value;
            if(!name) return;
            const res = await fetch('/api/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': getAuth() },
                body: JSON.stringify({ name, isCategory: true })
            });
            if(res.ok) location.reload();
        }

        async function saveProd() {
            const data = {
                name: document.getElementById('p-name').value,
                category: document.getElementById('p-cat').value,
                price: document.getElementById('p-price').value,
                material: document.getElementById('p-mat').value,
                image: document.getElementById('p-img').value,
                description: document.getElementById('p-desc').value
            };
            const res = await fetch('/api/add-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': getAuth() },
                body: JSON.stringify(data)
            });
            if(res.ok) location.reload();
            else alert("Errore: controlla password e campi.");
        }

        async function remove(id) {
            if(!confirm("Vuoi davvero eliminare questo elemento?")) return;
            const res = await fetch('/api/delete-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, token: getAuth() })
            });
            if(res.ok) location.reload();
        }

        sync();
    </script>
</body>
</html>
