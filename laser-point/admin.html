<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Laser Point - Pannello Gestione</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="container mx-auto px-4 py-10 max-w-5xl">
        
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-slate-800 tracking-tighter">LASER POINT <span class="text-blue-600">ADMIN</span></h1>
            <div id="authStatus" class="flex items-center gap-4">
                <div id="loginSection" class="flex gap-2">
                    <input type="password" id="adminToken" placeholder="Password Segreta" class="p-3 border rounded-xl shadow-sm outline-blue-500 bg-white text-sm">
                    <button onclick="saveToken()" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-blue-700">Accedi</button>
                </div>
                <div id="logoutSection" class="hidden flex items-center gap-3">
                    <span class="text-green-600 font-bold text-sm">● Sessione Attiva</span>
                    <button onclick="logout()" class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-lg hover:bg-red-200">Esci</button>
                </div>
            </div>
        </div>

        <div id="adminContent" class="grid grid-cols-1 lg:grid-cols-3 gap-10 opacity-50 pointer-events-none transition-opacity duration-500">
            <div class="lg:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-slate-200 h-fit sticky top-10">
                <h2 id="formTitle" class="text-xl font-bold mb-6">Gestisci Prodotto</h2>
                <input type="hidden" id="editId">
                <div class="space-y-4">
                    <input type="text" id="prodName" placeholder="Nome" class="w-full p-3 border rounded-lg text-sm">
                    <input type="text" id="prodMaterial" placeholder="Materiale" class="w-full p-3 border rounded-lg text-sm">
                    <textarea id="prodDesc" placeholder="Descrizione" class="w-full p-3 border rounded-lg h-24 text-sm"></textarea>
                    <input type="number" id="prodPrice" placeholder="Prezzo" step="0.01" class="w-full p-3 border rounded-lg text-sm">
                    <input type="text" id="prodImage" placeholder="Link Immagine (ImgBB)" class="w-full p-3 border rounded-lg text-sm">
                    <button onclick="saveProduct()" id="btnSave" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg">SALVA</button>
                    <button onclick="resetForm()" id="btnCancel" class="hidden w-full text-slate-500 py-2 text-sm italic">Annulla modifica</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-6 text-slate-700">Prodotti Online</h2>
                <div id="adminProductList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGICA DI ACCESSO ---
        
        function checkAuth() {
            const token = localStorage.getItem('laser_admin_token');
            const loginSection = document.getElementById('loginSection');
            const logoutSection = document.getElementById('logoutSection');
            const content = document.getElementById('adminContent');

            if (token) {
                loginSection.classList.add('hidden');
                logoutSection.classList.remove('hidden');
                content.classList.remove('opacity-50', 'pointer-events-none');
                loadAdminProducts();
            } else {
                loginSection.classList.remove('hidden');
                logoutSection.classList.add('hidden');
                content.classList.add('opacity-50', 'pointer-events-none');
            }
        }

        function saveToken() {
            const token = document.getElementById('adminToken').value;
            if (token) {
                localStorage.setItem('laser_admin_token', token);
                checkAuth();
            }
        }

        function logout() {
            localStorage.removeItem('laser_admin_token');
            location.reload();
        }

        function getToken() {
            return localStorage.getItem('laser_admin_token');
        }

        // --- GESTIONE PRODOTTI ---

        async function loadAdminProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                const list = document.getElementById('adminProductList');
                list.innerHTML = products.map(p => `
                    <div class="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-slate-100">
                        <div class="flex items-center gap-4">
                            <img src="${p.image}" class="w-12 h-12 rounded-lg object-cover bg-slate-50">
                            <div>
                                <h4 class="font-bold text-slate-800">${p.name}</h4>
                                <p class="text-xs text-slate-500">€${p.price}</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="setupEdit('${p.id}', '${encodeURIComponent(JSON.stringify(p))}')" class="px-3 py-1 bg-amber-50 text-amber-600 rounded-lg text-sm border border-amber-100 hover:bg-amber-100">Modifica</button>
                            <button onclick="deleteProduct('${p.id}')" class="px-3 py-1 bg-red-50 text-red-600 rounded-lg text-sm border border-red-100 hover:bg-red-100">Elimina</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Errore caricamento prodotti"); }
        }

        async function saveProduct() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('prodName').value,
                material: document.getElementById('prodMaterial').value,
                description: document.getElementById('prodDesc').value,
                price: document.getElementById('prodPrice').value,
                image: document.getElementById('prodImage').value,
            };

            const response = await fetch('/api/add-product', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': getToken() // Usa il token salvato!
                },
                body: JSON.stringify(data)
            });

            if(response.ok) {
                alert("Salvato con successo!");
                resetForm();
                loadAdminProducts();
            } else {
                alert("Errore. La password salvata potrebbe essere errata. Prova a fare logout e rientrare.");
            }
        }

        async function deleteProduct(id) {
            if(!confirm("Vuoi davvero eliminare questo oggetto?")) return;
            const response = await fetch('/api/delete-product', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, token: getToken() }) // Usa il token salvato!
            });

            if(response.ok) loadAdminProducts();
            else alert("Errore nella cancellazione.");
        }

        function setupEdit(id, jsonStr) {
            const p = JSON.parse(decodeURIComponent(jsonStr));
            document.getElementById('editId').value = id;
            document.getElementById('prodName').value = p.name;
            document.getElementById('prodMaterial').value = p.material;
            document.getElementById('prodDesc').value = p.description;
            document.getElementById('prodPrice').value = p.price;
            document.getElementById('prodImage').value = p.image;
            document.getElementById('formTitle').innerText = "Modifica Prodotto";
            document.getElementById('btnCancel').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function resetForm() {
            document.getElementById('editId').value = "";
            document.querySelectorAll('input:not(#adminToken), textarea').forEach(i => i.value = '');
            document.getElementById('formTitle').innerText = "Gestisci Prodotto";
            document.getElementById('btnCancel').classList.add('hidden');
        }

        // Avvio: controlla se sei già loggato
        checkAuth();
    </script>
</body>
</html>
