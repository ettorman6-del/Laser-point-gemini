<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Point - Creazioni Personalizzate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .active-filter { 
            background-color: #2563eb !important; 
            color: white !important; 
            border-color: #2563eb !important; 
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 py-4 border-b border-slate-200">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <h1 class="text-2xl font-extrabold tracking-tighter italic">LASER<span class="text-blue-600">POINT</span></h1>
            <a href="/admin.html" class="text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-blue-600 transition">Area Admin</a>
        </div>
    </nav>

    <header class="bg-slate-900 text-white py-20 relative overflow-hidden">
        <div class="container mx-auto px-6 text-center relative z-10">
            <span class="text-blue-400 font-bold text-sm tracking-widest uppercase">Artigianato Digitale</span>
            <h2 class="text-5xl md:text-6xl font-extrabold mt-4 mb-6 tracking-tight">Taglio Laser di Precisione</h2>
            <p class="text-slate-400 max-w-2xl mx-auto text-lg">Trasformiamo legno e plexiglass in ricordi unici per le tue feste, eventi e cerimonie.</p>
        </div>
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <svg width="100%" height="100%"><defs><pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(#grid)"/></svg>
        </div>
    </header>

    <section class="py-10 bg-white border-b sticky top-[65px] z-40">
        <div id="cat-nav" class="container mx-auto px-6 flex flex-wrap justify-center gap-3">
            <button onclick="filterBy('all', this)" class="cat-btn active-filter px-6 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold transition-all shadow-sm">Tutti i Prodotti</button>
            </div>
    </section>

    <main class="container mx-auto px-6 py-16">
        <div id="prod-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="animate-pulse bg-slate-200 h-80 rounded-3xl"></div>
            <div class="animate-pulse bg-slate-200 h-80 rounded-3xl"></div>
            <div class="animate-pulse bg-slate-200 h-80 rounded-3xl"></div>
        </div>
    </main>

    <footer class="bg-white border-t py-12 text-center text-slate-400 text-sm">
        <p>&copy; 2026 Laser Point - Villa San Giovanni. Tutti i diritti riservati.</p>
    </footer>

    <script>
        let allProducts = [];

        async function init() {
            try {
                const res = await fetch('/api/products');
                const data = await res.json();
                
                const categories = data.filter(i => i.id.startsWith('cat_'));
                allProducts = data.filter(i => i.id.startsWith('prod_'));

                const catNav = document.getElementById('cat-nav');
                categories.forEach(c => {
                    catNav.innerHTML += `
                        <button onclick="filterBy('${c.name}', this)" class="cat-btn px-6 py-2.5 rounded-full border border-slate-200 bg-white text-sm font-bold transition-all hover:border-blue-600 shadow-sm">
                            ${c.name}
                        </button>`;
                });

                render(allProducts);
            } catch (e) {
                document.getElementById('prod-grid').innerHTML = "<p class='text-center col-span-full'>Errore nel caricamento dei prodotti.</p>";
            }
        }

        function filterBy(name, el) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active-filter'));
            el.classList.add('active-filter');

            const filtered = name === 'all' ? allProducts : allProducts.filter(p => p.category === name);
            render(filtered);
        }

        function render(list) {
            const grid = document.getElementById('prod-grid');
            if(list.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center text-slate-400 py-20">Nessun articolo trovato in questa categoria.</p>';
                return;
            }
            grid.innerHTML = list.map(p => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-500 border border-slate-100 group">
                    <div class="overflow-hidden h-72">
                        <img src="${p.image || 'https://via.placeholder.com/600x400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.2em] bg-blue-50 px-3 py-1 rounded-full">${p.category}</span>
                            <span class="text-xs text-slate-400 font-medium">${p.material || ''}</span>
                        </div>
                        <h3 class="text-2xl font-bold mb-3 tracking-tight">${p.name}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed mb-6 line-clamp-2">${p.description || ''}</p>
                        <div class="flex justify-between items-center pt-6 border-t border-slate-50">
                            <span class="text-3xl font-black text-slate-900">€${parseFloat(p.price).toFixed(2)}</span>
                            <button class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-sm font-bold hover:bg-blue-600 transition shadow-lg shadow-slate-200">Ordina</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>
