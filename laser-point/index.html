<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Point - Articoli in Legno e Plexiglass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-md p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800 tracking-wider">LASER <span class="text-blue-600">POINT</span></h1>
            <div class="space-x-6 text-gray-600 font-medium">
                <a href="#prodotti" class="hover:text-blue-600">Prodotti</a>
                <a href="#contatti" class="hover:text-blue-600">Contatti</a>
                <a href="/admin" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Area Riservata</a>
            </div>
        </div>
    </nav>

    <header class="bg-blue-600 py-20 text-white text-center">
        <h2 class="text-4xl md:text-6xl font-extrabold mb-4">Taglio Laser di Precisione</h2>
        <p class="text-xl opacity-90">Creazioni personalizzate in Plexiglass e Legno per i tuoi eventi speciali.</p>
    </header>

    <main id="prodotti" class="container mx-auto py-16 px-4">
        <h3 class="text-3xl font-bold text-center mb-12 text-gray-800">Le Nostre Creazioni</h3>
        <div id="product-container" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
            <div class="animate-pulse bg-gray-200 h-64 rounded-xl"></div>
        </div>
    </main>

    <script>
        // Funzione per caricare i prodotti dal backend
        async function fetchProducts() {
            const res = await fetch('/api/products');
            const products = await res.json();
            const container = document.getElementById('product-container');
            container.innerHTML = products.map(p => `
                <div class="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-100 hover:shadow-2xl transition">
                    <img src="${p.image}" alt="${p.name}" class="w-full h-56 object-cover">
                    <div class="p-6">
                        <h4 class="text-xl font-bold mb-2">${p.name}</h4>
                        <p class="text-gray-600 mb-4">${p.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-2xl font-bold text-blue-600">€${p.price}</span>
                            <button class="bg-gray-800 text-white px-4 py-2 rounded-md">Ordina ora</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        fetchProducts();
    </script>
</body>
</html>
