<!DOCTYPE html>
<html lang="it" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Point - Creazioni uniche in Legno e Plexiglass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        laserBlue: '#0070f3',
                        woodBrown: '#a67c52',
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .product-card { opacity: 0; } /* Necessario per l'animazione JS */
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white/90 backdrop-blur-sm sticky top-0 z-50 border-b border-gray-100">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-3xl font-extrabold tracking-tighter">
                <span class="text-gray-950">LASER</span><span class="text-laserBlue">POINT</span>
            </h1>
            <div class="hidden md:flex items-center space-x-8 font-medium text-gray-700">
                <a href="#prodotti" class="hover:text-laserBlue transition">Collezioni</a>
                <a href="#materiali" class="hover:text-laserBlue transition">Materiali</a>
                <a href="/admin.html" class="text-sm bg-gray-900 text-white px-5 py-2.5 rounded-full hover:bg-gray-700 transition transform hover:scale-105 shadow-sm">
                    Area Admin
                </a>
            </div>
        </div>
    </nav>

    <header class="relative bg-gray-950 py-24 md:py-32 overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <svg width="100%" height="100%"><defs><pattern id="ped" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1" fill="#fff"/></pattern></defs><rect width="100%" height="100%" fill="url(#ped)"/></svg>
        </div>
        <div class="container mx-auto px-6 relative z-10 text-center animate-fade-in-up">
            <span class="inline-block bg-laserBlue/10 text-laserBlue text-xs font-bold px-4 py-1 rounded-full mb-4">ARTIGIANATO DIGITALE</span>
            <h2 class="text-5xl md:text-7xl font-extrabold text-white tracking-tighter mb-6 leading-tight">
                Rendiamo eterni i tuoi <br> momenti speciali.
            </h2>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto mb-10">
                Nomi in legno per cerimonie, biglietti in plexiglass specchiato, decorazioni uniche. Taglio laser di precisione.
            </p>
            <a href="#prodotti" class="bg-white text-gray-950 px-8 py-4 rounded-xl font-bold text-lg hover:bg-gray-200 transition shadow-lg">
                Esplora le Creazioni
            </a>
        </div>
    </header>

    <main id="prodotti" class="container mx-auto py-20 px-6">
        <div class="flex justify-between items-center mb-16">
            <h3 class="text-4xl font-bold tracking-tight text-gray-950">Le nostre Categorie</h3>
            <span class="text-laserBlue font-medium">Vedi tutti →</span>
        </div>

        <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 animate-pulse">
                <div class="bg-gray-200 h-64 rounded-xl mb-4"></div>
                <div class="h-6 bg-gray-200 rounded w-2/3 mb-2"></div>
                <div class="h-4 bg-gray-200 rounded w-full"></div>
            </div>
            </div>
    </main>

    <script>
        // Funzione per caricare prodotti via API
        async function fetchProducts() {
            const container = document.getElementById('product-container');
            try {
                const res = await fetch('/api/products');
                if (!res.ok) throw new Error("Errore caricamento");
                const products = await res.json();
                
                container.innerHTML = products.map((p, index) => `
                    <div class="product-card bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 border border-gray-100 overflow-hidden group transform hover:-translate-y-2" 
                         style="animation: fadeInUp 0.5s ease-out forwards ${index * 0.1}s">
                        <div class="overflow-hidden aspect-w-16 aspect-h-11">
                            <img src="${p.image || 'https://via.placeholder.com/600x400?text=Laser+Point'}" 
                                 alt="${p.name}" 
                                 class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-500">
                        </div>
                        <div class="p-8">
                            <span class="text-xs font-mono text-woodBrown bg-woodBrown/5 px-3 py-1 rounded-full">${p.material || 'Personalizzato'}</span>
                            <h4 class="text-2xl font-bold mt-3 mb-2 text-gray-950 tracking-tight">${p.name}</h4>
                            <p class="text-gray-600 mb-6 text-sm leading-relaxed line-clamp-2">${p.description}</p>
                            <div class="flex justify-between items-center pt-5 border-t border-gray-100">
                                <span class="text-3xl font-extrabold text-laserBlue">€${parseFloat(p.price).toFixed(2)}</span>
                                <button class="bg-gray-900 text-white px-6 py-3 rounded-xl text-sm font-semibold hover:bg-laserBlue transition shadow-md">
                                    Info / Ordina
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = `<p class="text-center text-red-500 py-10 Colonna">Impossibile caricare i prodotti al momento.</p>`;
            }
        }
        fetchProducts();
    </script>
</body>
</html>
